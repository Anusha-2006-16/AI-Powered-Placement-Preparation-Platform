`<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Skill Gap Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header">
            <h3>Skill Gap Tracker</h3>
        </div>

        <div class="card-body">

            <table class="table">

                <thead>

                <tbody>

            <tr th:each="skill : ${skills}">

                <td th:text="${skill.skillName}"></td>

                <td>
        <span th:if="${skill.completed}"
              class="badge bg-success">
            Completed
        </span>

                    <span th:unless="${skill.completed}"
                          class="badge bg-warning">
            Pending
        </span>
                </td>

                <td>
                    <form th:if="${!skill.completed}"
                          th:action="@{/skills/complete/{id}(id=${skill.id})}"
                          method="post">

                        <button class="btn btn-success btn-sm">
                            Mark Completed
                        </button>

                    </form>
                </td>

            </tr>

                </tbody>

                </thead>

                <tbody>

                <tr th:each="skill : ${skills}">
                    <td th:text="${skill}"></td>

                    <td>
        <span th:if="${skill.completed}"
              class="badge bg-success">
            Completed
        </span>

                        <span th:unless="${skill.completed}"
                              class="badge bg-warning">
            Pending
        </span>
                    </td>

                    <td>
                        <a th:if="${!skill.completed}"
                           th:href="@{/skills/completed/{id}(id=${skill.id})}"
                           class="btn btn-success btn-sm">
                            Mark Completed
                        </a>
                    </td>
                </tr>
                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>`
