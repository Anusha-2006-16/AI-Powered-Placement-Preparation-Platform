<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <h2 th:text="${question}"></h2>
<form th:action="@{/resume/evaluate}" method="post">
    <input type="hidden" name="question" th:value="${question}">
    <textarea name="answer" rows="10" cols="80"></textarea>
    <br>
    <button type="submit">Submit Answer</button>
</form>
</body>
</html>
