<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

<div class="container py-4">

    <h2 class="mb-4">
        Welcome,
        <span class="text-primary" th:text="${user.name}"></span>
    </h2>

    <!-- Stats Cards -->

    <div class="row g-4">

        <div class="col-md-4 col-lg-2">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h6>Total Resumes</h6>
                    <h3 th:text="${dashboard.totalResumesUploaded}"></h3>
                </div>
            </div>
        </div>

        <div class="col-md-4 col-lg-2">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h6>Latest ATS</h6>
                    <h3 th:text="${dashboard.latestAtsScore}"></h3>
                </div>
            </div>
        </div>

        <div class="col-md-4 col-lg-2">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h6>Average ATS</h6>
                    <h3 th:text="${dashboard.averageAtsScore}"></h3>
                </div>
            </div>
        </div>

        <div class="col-md-4 col-lg-2">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h6>Mock Interviews</h6>
                    <h3 th:text="${dashboard.mockInterviewsTaken}"></h3>
                </div>
            </div>
        </div>

        <div class="col-md-4 col-lg-2">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h6>Highest Score</h6>
                    <h3 th:text="${dashboard.highestInterviewScore}"></h3>
                </div>
            </div>
        </div>

        <div class="col-md-4 col-lg-2">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h6>Readiness</h6>
                    <h3>
                        <span th:text="${dashboard.interviewReadiness}"></span>%
                    </h3>
                </div>
            </div>
        </div>

    </div>

    <!-- Charts -->

    <div class="row mt-5">

        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header">
                    ATS Score Trend
                </div>
                <div class="card-body">
                    <canvas id="atsChart"></canvas>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header">
                    Interview Scores
                </div>
                <div class="card-body">
                    <canvas id="interviewChart"></canvas>
                </div>
            </div>
        </div>

    </div>

    <!-- Quick Actions -->

    <div class="card shadow-sm mt-5">
        <div class="card-header">
            Quick Actions
        </div>

        <div class="card-body">

            <a th:href="@{/resume/upload}"
               class="btn btn-primary me-2 mb-2">
                Upload Resume
            </a>

            <a th:href="@{/resume/my}"
               class="btn btn-success me-2 mb-2">
                My Resumes
            </a>

            <a th:href="@{/resume/analytics}"
               class="btn btn-dark me-2 mb-2">
                ATS Analytics
            </a>

            <a th:href="@{/test/start}"
               class="btn btn-warning me-2 mb-2">
                Take Quiz
            </a>

            <a th:href="@{/test/history}"
               class="btn btn-info me-2 mb-2">
                Quiz History
            </a>

            <a th:href="@{/resume/interview/history}"
               class="btn btn-secondary me-2 mb-2">
                Interview History
            </a>

            <a th:href="@{/skills/{id}(id=${user.resumes[0].id})}"
               class="btn btn-warning mb-2">
                Skill Gap Tracker
            </a>

        </div>
    </div>


</div>
</body>

<script>
    let atsScores = [[${dashboard.atsScores}]];
let interviewScores = [[${dashboard.interviewScores}]];

new Chart(
    document.getElementById("atsChart"),
    {
        type: "line",
        data: {
            labels: atsScores.map(
                (v, i) => "Resume " + (i + 1)
            ),
            datasets: [{
                label: "ATS Score",
                data: atsScores,
                tension: 0.4,
                borderWidth: 3
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    max: 100
                }
            }
        }
    }
);

new Chart(
    document.getElementById("interviewChart"),
    {
        type: "bar",
        data: {
            labels: interviewScores.map(
                (v, i) => "Interview " + (i + 1)
            ),
            datasets: [{
                label: "Interview Score",
                data: interviewScores,
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    max: 100
                }
            }
        }
    }
);
</script>

</html>
