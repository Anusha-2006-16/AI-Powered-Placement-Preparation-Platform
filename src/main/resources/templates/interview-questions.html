<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Interview Questions</title>
</head>
<body>
    <h1>AI Interview Questions</h1>


    <form th:action="@{/resume/interview/submit}" method="post">
        <div th:each="q,stat:${questions}">
            <h3 th:text="${q.question}"></h3>
            <textarea
            th:name="'answer'+${stat.index}"
            rows="5">

            </textarea>

            <input type="hidden"
            th:name="'question'+${stat.index}"
            th:value="${q}">
        </div>
        <button type="submit">
            Finish Interview
        </button>
    </form>

<a th:href="@{/resume/my}">
    Back To Resumes
</a>

</body>
</html>
